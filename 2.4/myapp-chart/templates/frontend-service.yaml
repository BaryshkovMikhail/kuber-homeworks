{{- if .Values.components.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app: {{ .Release.Name }}
    component: frontend
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.components.frontend.port }}
    protocol: TCP
  selector:
    app: {{ .Release.Name }}
    component: frontend
{{- end }}