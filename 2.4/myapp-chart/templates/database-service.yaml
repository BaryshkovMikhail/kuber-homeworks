{{- if .Values.components.database.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-database
  labels:
    app: {{ .Release.Name }}
    component: database
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.components.database.port }}
    targetPort: {{ .Values.components.database.port }}
    protocol: TCP
  selector:
    app: {{ .Release.Name }}
    component: database
{{- end }}