{{- if .Values.components.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app: {{ .Release.Name }}
    component: backend
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.components.backend.port }}
    targetPort: {{ .Values.components.backend.port }}
    protocol: TCP
  selector:
    app: {{ .Release.Name }}
    component: backend
{{- end }}