apiVersion: v1
kind: ConfigMap
metadata:
  name: web-content
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HTTPS App with TLS</title>
        <style>
            body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
            .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
            h1 { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
            .ssl-info { background: #e8f4fc; border-left: 4px solid #3498db; padding: 15px; margin: 20px 0; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>🔒 HTTPS Application with TLS</h1>
            <div class="ssl-info">
                <h3>SSL/TLS Information:</h3>
                <p><strong>Status:</strong> Secure Connection ✓</p>
                <p><strong>Certificate:</strong> Self-signed (for testing)</p>
                <p><strong>Domain:</strong> myapp.example.com</p>
            </div>
            <p>This application is served over HTTPS using TLS certificate from Kubernetes Secret.</p>
            <p><strong>Current Time:</strong> <span id="timestamp"></span></p>
        </div>
        <script>document.getElementById('timestamp').textContent = new Date().toLocaleString();</script>
    </body>
    </html>
