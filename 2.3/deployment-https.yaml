apiVersion: apps/v1
kind: Deployment
metadata:
  name: https-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: https-app
  template:
    metadata:
      labels:
        app: https-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: web-content
          mountPath: /usr/share/nginx/html
      volumes:
      - name: web-content
        configMap:
          name: web-content

---
apiVersion: v1
kind: Service
metadata:
  name: https-app-service
spec:
  selector:
    app: https-app
  ports:
  - port: 80
    targetPort: 80